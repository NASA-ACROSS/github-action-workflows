name: |-
  CI Checks Workflow

  Runs format, lint, types and tests.

on:
  workflow_call:
    inputs:
      format-changed-files:
        description: Only run formatting/linting on changed files.
        required: false
        default: true
        type: boolean
      runtime:
        description: Runtime environment (`python` or `node`)
        required: false
        default: "python"
        type: string
      runtime-version:
        description: Version of the runtime env (python or node)
        required: false
        type: string

    secrets:
      ssh-private-key:
        description: "SSH Private Key to access private repositories (only needed for python)"
        required: false

jobs:
  runtime:
    runs-on: ubuntu-24.04
    steps:
      - run: |
          echo "Runtime: ${{inputs.runtime}}"
          if [ -n "${{ inputs.runtime-version }}" ]; then
            echo "Version: ${{inputs.runtime-version}}"
          fi
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Format Check (Python)
        if: inputs.runtime == 'python'
        uses: NASA-ACROSS/github-action-python-checks@v1.0.3
        with:
          check-type: format
          changed-files: ${{ inputs.format-changed-files }}
          ssh-private-key: ${{ secrets.ssh-private-key }}

      - name: Format Check (Node)
        if: inputs.runtime == 'node'
        uses: NASA-ACROSS/github-action-node-checks@v1
        with:
          check-type: format

  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Lint Check (Python)
        if: inputs.runtime == 'python'
        run: echo "No linting for Python runtime since it's covered by formatting check."

      - name: Checkout code
        if: inputs.runtime == 'node'
        uses: actions/checkout@v4

      - name: Lint Check (Node)
        if: inputs.runtime == 'node'
        uses: NASA-ACROSS/github-action-node-checks@v1
        with:
          check-type: lint

  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup (Python)
        if: inputs.runtime == 'python'
        uses: NASA-ACROSS/github-action-python-setup@v1.0.2
        with:
          python-version: ${{ inputs.runtime-version || '3.12' }}

      - name: Run Tests (Python)
        if: inputs.runtime == 'python'
        uses: NASA-ACROSS/github-action-python-checks@v1.0.3
        with:
          check-type: test
          ssh-private-key: ${{ secrets.ssh-private-key }}

      - name: Run Tests (Node)
        if: inputs.runtime == 'node'
        uses: NASA-ACROSS/github-action-node-checks@v1
        with:
          check-type: test

  types:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup (Python)
        if: inputs.runtime == 'python'
        uses: NASA-ACROSS/github-action-python-setup@v1.0.2
        with:
          python-version: ${{ inputs.runtime-version || '3.12' }}

      - name: Type Check (Python)
        if: inputs.runtime == 'python'
        uses: NASA-ACROSS/github-action-python-checks@v1.0.3
        with:
          check-type: types
          ssh-private-key: ${{ secrets.ssh-private-key }}

      - name: Type Check (Node)
        if: inputs.runtime == 'node'
        uses: NASA-ACROSS/github-action-node-checks@v1
        with:
          check-type: types
